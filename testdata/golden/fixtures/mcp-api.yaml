openapi: "3.0.3"
info:
  title: MCP Cloudflare API
  version: "1.0.0"
  description: Golden fixture exercising x-mcp on an OpenAPI spec.
servers:
  - url: https://api.example.com/v1
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
x-mcp:
  transport: [stdio, http]
  orchestration: code
  endpoint_tools: hidden
paths:
  /items:
    get:
      tags: [items]
      operationId: listItems
      summary: List items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
