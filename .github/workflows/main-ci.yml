name: Main CI

# Runs the full unit-test + golden-verify suite against main and against PRs
# targeting main. The push trigger is the post-merge alarm; the pull_request
# trigger lets a branch protection rule require the stable build-and-test check
# with "Require branches to be up to date before merging" enabled.
#
# The existing CI in lint.yml runs sharded, change-gated tests to keep PR
# turnaround fast. This workflow is intentionally redundant as a single
# load-bearing signal branch protection can pin against. Its expensive work is
# split across parallel jobs, then folded into the stable build-and-test check.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# cancel-in-progress so a batch of rapid merges only burns CI for the final
# state. The question this workflow answers is "is this PR up to date with main
# and does the full suite pass?" Only the latest run for a ref matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  classify:
    name: classify full-suite scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needs_build: ${{ steps.changes.outputs.needs_build }}
      needs_tests: ${{ steps.changes.outputs.needs_tests }}
      needs_golden: ${{ steps.changes.outputs.needs_golden }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          needs_build=false
          needs_tests=false
          needs_golden=false

          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Keep the post-merge alarm full-strength on main. PRs get the
            # scoped path below so docs-only changes do not burn the suite.
            needs_build=true
            needs_tests=true
            needs_golden=true
          else
            git fetch --no-tags --prune origin "${{ github.base_ref }}"
            mapfile -t changed < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD")

            echo "Changed files:"
            printf '  %s\n' "${changed[@]}"

            for file in "${changed[@]}"; do
              case "$file" in
                .github/workflows/main-ci.yml)
                  needs_build=true
                  needs_tests=true
                  needs_golden=true
                  ;;
                *.go|go.mod|go.sum|cmd/*|catalog/*|internal/*)
                  needs_build=true
                  needs_tests=true
                  ;;
              esac

              case "$file" in
                .github/workflows/main-ci.yml|.github/workflows/lint.yml|scripts/*|testdata/*)
                  needs_tests=true
                  ;;
              esac

              case "$file" in
                .github/workflows/main-ci.yml|.github/workflows/golden.yml|cmd/*|internal/*|catalog/*|testdata/golden/*|scripts/golden.sh|go.mod|go.sum)
                  needs_golden=true
                  ;;
              esac
            done
          fi

          {
            echo "needs_build=$needs_build"
            echo "needs_tests=$needs_tests"
            echo "needs_golden=$needs_golden"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Full-suite scope"
            echo
            echo "- build: \`$needs_build\`"
            echo "- tests: \`$needs_tests\`"
            echo "- golden: \`$needs_golden\`"
          } >> "$GITHUB_STEP_SUMMARY"

  full-build:
    name: full-build
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.needs_build == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

  full-test:
    name: full-test
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.needs_tests == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Test
        run: go test -timeout 15m ./...

  full-golden:
    name: full-golden
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.needs_golden == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify golden fixtures
        run: bash scripts/golden.sh verify

  build-and-test:
    runs-on: ubuntu-latest
    needs:
      - classify
      - full-build
      - full-test
      - full-golden
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Check full-suite jobs
        shell: bash
        run: |
          if [[ "${{ needs.classify.result }}" != "success" ]]; then
            echo "change classification failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_build }}" == "true" && "${{ needs.full-build.result }}" != "success" ]]; then
            echo "full-build failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_tests }}" == "true" && "${{ needs.full-test.result }}" != "success" ]]; then
            echo "full-test failed or was cancelled."
            exit 1
          fi
          if [[ "${{ needs.classify.outputs.needs_golden }}" == "true" && "${{ needs.full-golden.result }}" != "success" ]]; then
            echo "full-golden failed or was cancelled."
            exit 1
          fi

          echo "Full-suite scope:"
          echo "  build=${{ needs.classify.outputs.needs_build }} result=${{ needs.full-build.result }}"
          echo "  tests=${{ needs.classify.outputs.needs_tests }} result=${{ needs.full-test.result }}"
          echo "  golden=${{ needs.classify.outputs.needs_golden }} result=${{ needs.full-golden.result }}"
