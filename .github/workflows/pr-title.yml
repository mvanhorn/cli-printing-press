name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  lint:
    name: pr-title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip Mergify merge queue batches
        if: startsWith(github.event.pull_request.title, 'merge queue:')
        run: echo "Skipping semantic title check for Mergify merge queue batch."

      - uses: amannn/action-semantic-pull-request@v6
        if: ${{ !startsWith(github.event.pull_request.title, 'merge queue:') }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            perf
            build
            style
            revert
          requireScope: true
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the colon"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
